# Nginx load balancer — round-robin across 2 Kimodo GPU instances
upstream kimodo_backends {
    least_conn;
    server kimodo-gpu0:9551;
    server kimodo-gpu1:9551;
}

server {
    listen 80;

    location / {
        proxy_pass         http://kimodo_backends;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
