# Extra nginx locations for the VLM pipeline
# Proxies /render/* to the render-api container

upstream render_api {
    server host.docker.internal:9000;
}

server {
    listen 77770;

    # VST upload (existing)
    location /api/ {
        proxy_pass http://vst-ingress-dev:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 2G;
        proxy_request_buffering off;
    }

    # Render API proxy
    location /render/ {
        proxy_pass http://render_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
