services:
  render-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vlm-render-api:latest
    container_name: render-api
    runtime: nvidia
    ports:
      - "${RENDER_API_PORT:-9000}:9000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYOPENGL_PLATFORM=egl
      - COSMOS_REASON2_URL=http://host-gateway:${VLM_PORT:-30082}
      - COSMOS_TRANSFER_URL=http://cosmos-transfer:8080
      - KIMODO_API_URL=http://kimodo-api:9551
      - KIMODO_OUTPUT_DIR=/kimodo_output
      - RENDER_OUTPUT_DIR=/render_output
      - INSIGHTFACE_MODEL=/models/inswapper_128.onnx
      - HF_HOME=/hf_cache
    volumes:
      - ../../kimodo:/kimodo:ro
      - ${HF_CACHE:-/ephemeral/cache/huggingface}:/hf_cache
      - ~/.insightface:/root/.insightface
      - /tmp/insightface_models:/models:ro
      - ${KIMODO_OUTPUT_DIR:-/home/ubuntu/kimodo_output}:/kimodo_output
      - ${RENDER_OUTPUT_DIR:-/home/ubuntu/render_output}:/render_output
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ./server.py:/app/server.py:ro
      - ./render:/app/render:ro
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - vlm-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  vlm-net:
    external: true
