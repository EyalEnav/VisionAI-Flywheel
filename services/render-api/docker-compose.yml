services:
  render-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vlm-render-api:latest
    container_name: render-api
    runtime: nvidia
    ports:
      - "${RENDER_API_PORT:-9001}:9000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${VSS_GPU_DEVICE:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYOPENGL_PLATFORM=egl
      - COSMOS_REASON2_URL=http://host-gateway:${VLM_PORT:-30082}
      - KIMODO_OUTPUT_DIR=/kimodo_output
      - RENDER_OUTPUT_DIR=/render_output
      - INSIGHTFACE_MODEL=/models/inswapper_128.onnx
      - HF_HOME=/hf_cache
      # VLM backend: vss | qwen | qwen7b | openai | nim
      - VLM_BACKEND=${VLM_BACKEND:-vss}
      - VSS_URL=http://host-gateway:8000
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NIM_URL=${NIM_URL:-}
      - NIM_MODEL=${NIM_MODEL:-}
      - VLLM_URL=http://host-gateway:${VLLM_PORT:-8090}
      - VLLM_MODEL=${VLLM_MODEL:-vllm-local}
    volumes:
      # Kimodo submodule (editable install happens in entrypoint)
      - /home/ubuntu/kimodo:/kimodo:ro
      # Shared caches
      - ${HF_CACHE:-/opt/dlami/nvme/hf_cache}:/hf_cache
      # InsightFace models
      - ~/.insightface:/root/.insightface
      - /tmp/insightface_models:/models:ro
      # Motion files in/out
      - ${KIMODO_OUTPUT_DIR:-/home/ubuntu/kimodo_output}:/kimodo_output
      - ${RENDER_OUTPUT_DIR:-/home/ubuntu/render_output}:/render_output
      # VSS clip storage (for VSS backend)
      - /home/ubuntu/video-search-and-summarization/deployments/data-dir:/vss_data
      # Docker socket (for docker-ps endpoint)
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/lib/x86_64-linux-gnu/libseccomp.so.2:/usr/lib/x86_64-linux-gnu/libseccomp.so.2:ro
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - vlm-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VSS_GPU_DEVICE:-0}"]
              capabilities: [gpu]

networks:
  vlm-net:
    name: vlm-net
    external: true
