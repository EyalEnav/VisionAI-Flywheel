services:
  kimodo-api:
    build:
      context: ../../kimodo
      dockerfile: ../services/kimodo-api/Dockerfile
    image: kimodo-api:latest
    container_name: kimodo-api
    runtime: nvidia
    ports:
      - "9551:9551"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/hf_cache
      - KIMODO_OUTPUT_DIR=/kimodo_output
      - PYTHONUNBUFFERED=1
    volumes:
      - /home/ubuntu/.cache/huggingface:/hf_cache
      - ${KIMODO_OUTPUT_DIR:-/home/ubuntu/kimodo_output}:/kimodo_output
    networks:
      - vlm-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9551/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "16gb"
    ipc: host

networks:
  vlm-net:
    external: true
