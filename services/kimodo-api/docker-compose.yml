networks:
  vlm-net:
    external: true
services:
  kimodo-api:
    build:
      context: ../../kimodo
      dockerfile: ../services/kimodo-api/Dockerfile
    container_name: kimodo-api
    deploy:
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            device_ids:
            - '1'
            driver: nvidia
    environment:
    - NVIDIA_VISIBLE_DEVICES=1
    - CUDA_VISIBLE_DEVICES=0
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - HF_HOME=/hf_cache
    - KIMODO_OUTPUT_DIR=/kimodo_output
    - PYTHONUNBUFFERED=1
    healthcheck:
      interval: 15s
      retries: 8
      start_period: 120s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9551/health
      timeout: 10s
    image: kimodo-api:latest
    ipc: host
    networks:
    - vlm-net
    ports:
    - 9551:9551
    restart: on-failure
    runtime: nvidia
    shm_size: 16gb
    volumes:
    - /home/ubuntu/.cache/huggingface:/hf_cache
    - ${KIMODO_OUTPUT_DIR:-/home/ubuntu/kimodo_output}:/kimodo_output
