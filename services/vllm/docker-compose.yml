services:
  vllm:
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: vllm
    runtime: nvidia
    ports:
      - "${VLLM_PORT:-8090}:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${VLLM_GPU_DEVICE:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/hf_cache
      - HUGGING_FACE_HUB_TOKEN=${HUGGINGFACE_TOKEN}
      # Tune based on available VRAM:
      #   Qwen2.5-VL-2B  → gpu_memory_utilization=0.30 (fits alongside VSS)
      #   Qwen2.5-VL-7B  → gpu_memory_utilization=0.55
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen3-VL-2B-Instruct}
      - VLLM_GPU_MEMORY_UTILIZATION=${VLLM_GPU_MEMORY_UTILIZATION:-0.30}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-4096}
    volumes:
      - ${HF_CACHE:-/opt/dlami/nvme/hf_cache}:/hf_cache
    networks:
      - vlm-net
    shm_size: "8gb"
    ipc: host
    restart: on-failure
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3-VL-2B-Instruct}
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.30}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --trust-remote-code
      --served-model-name vllm-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_GPU_DEVICE:-0}"]
              capabilities: [gpu]

networks:
  vlm-net:
    name: vlm-net
    external: true
