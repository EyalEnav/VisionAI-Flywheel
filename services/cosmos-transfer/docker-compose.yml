services:
  cosmos-transfer:
    image: cosmos-transfer:local
    container_name: cosmos-transfer
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "8080:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${TRANSFER_GPU_DEVICE:-1}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/hf_cache
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - /home/ubuntu/vlm-pipeline/cosmos-transfer2.5:/workspace
      - /home/ubuntu/vlm-pipeline/services/cosmos-transfer/cosmos_api.py:/cosmos_api.py:ro
      - ${HF_CACHE:-/opt/dlami/nvme/hf_cache}:/hf_cache
      - /tmp:/tmp
    networks:
      - vlm-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${TRANSFER_GPU_DEVICE:-1}']
              capabilities: [gpu]
    command: ["python3", "/cosmos_api.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  vlm-net:
    name: vlm-net
    external: true
