version: "3.8"
services:
  cosmos-transfer:
    image: cosmos-transfer:local
    container_name: cosmos-transfer
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_HOME=/hf_cache
      - TRANSFORMERS_CACHE=/hf_cache
    ports:
      - "8080:8080"
    volumes:
      - /home/ubuntu/cosmos-transfer2.5:/workspace
      - /home/ubuntu/VisionAI-Flywheel/services/cosmos-transfer/cosmos_api.py:/cosmos_api.py:ro
      - ${HF_CACHE:-/home/ubuntu/.cache/huggingface}:/hf_cache
      - /tmp:/tmp
      - /home/ubuntu/render_output:/render_output
      - /home/ubuntu/video-search-and-summarization/deployments/data-dir/data_log/vst/clip_storage:/clip_storage:ro
      - /opt/dlami/nvme/cosmos_bg:/cosmos_bg
      - /opt/dlami/nvme/cosmos_masks:/cosmos_masks
      - /opt/dlami/nvme/cosmos_bg_v2:/cosmos_bg_v2
      - /opt/dlami/nvme/cosmos_sigma80:/cosmos_sigma80
    shm_size: "8gb"
    command: >
      python3 /cosmos_api.py
